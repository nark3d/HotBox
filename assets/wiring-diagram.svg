<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c0392b"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2980b9"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#27ae60"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#e67e22"/>
    </marker>
  </defs>

  <rect width="900" height="500" rx="12" fill="#1a1a2e"/>

  <text x="450" y="35" text-anchor="middle" fill="#eee" font-size="20" font-weight="bold">HotBox Wiring Diagram</text>

  <!-- Mainboard -->
  <rect x="30" y="70" width="200" height="220" rx="8" fill="#16213e" stroke="#4a6fa5" stroke-width="2"/>
  <text x="130" y="95" text-anchor="middle" fill="#eee" font-size="14" font-weight="bold">Mainboard</text>
  <text x="130" y="112" text-anchor="middle" fill="#8899aa" font-size="10">(Octopus Pro or similar)</text>

  <rect x="50" y="130" width="160" height="30" rx="4" fill="#1a3a5c" stroke="#4a6fa5" stroke-width="1"/>
  <text x="130" y="150" text-anchor="middle" fill="#7ec8e3" font-size="11">Thermistor Pin (PF6/PF7)</text>

  <rect x="50" y="175" width="160" height="30" rx="4" fill="#1a3a5c" stroke="#4a6fa5" stroke-width="1"/>
  <text x="130" y="195" text-anchor="middle" fill="#82e0aa" font-size="11">Fan Pin (PD14)</text>

  <rect x="50" y="220" width="160" height="30" rx="4" fill="#1a3a5c" stroke="#4a6fa5" stroke-width="1"/>
  <text x="130" y="240" text-anchor="middle" fill="#f0b27a" font-size="11">Heater Pin (PA3)</text>

  <!-- PSU -->
  <rect x="30" y="360" width="200" height="90" rx="8" fill="#1c2833" stroke="#e67e22" stroke-width="2"/>
  <text x="130" y="390" text-anchor="middle" fill="#eee" font-size="14" font-weight="bold">PSU</text>
  <text x="130" y="410" text-anchor="middle" fill="#e67e22" font-size="12">24V DC Rail</text>
  <text x="130" y="430" text-anchor="middle" fill="#888" font-size="10">Must support 200W+ overhead</text>

  <!-- MOSFET -->
  <rect x="350" y="350" width="160" height="100" rx="8" fill="#2c1810" stroke="#e67e22" stroke-width="2"/>
  <text x="430" y="380" text-anchor="middle" fill="#eee" font-size="13" font-weight="bold">MOSFET</text>
  <text x="430" y="400" text-anchor="middle" fill="#bbb" font-size="10">Power switching module</text>
  <text x="370" y="430" fill="#e67e22" font-size="9">24V IN</text>
  <text x="455" y="430" fill="#c0392b" font-size="9">24V OUT</text>
  <text x="400" y="445" fill="#f0b27a" font-size="9">2-pin CTRL</text>

  <!-- HotBox -->
  <rect x="600" y="60" width="270" height="390" rx="10" fill="#2d1f1f" stroke="#c0392b" stroke-width="2.5"/>
  <text x="735" y="90" text-anchor="middle" fill="#eee" font-size="16" font-weight="bold">HotBox</text>

  <!-- PTC Heater -->
  <rect x="625" y="110" width="220" height="60" rx="6" fill="#3d1f1f" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="735" y="135" text-anchor="middle" fill="#e74c3c" font-size="13" font-weight="bold">PTC Heater Element</text>
  <text x="735" y="155" text-anchor="middle" fill="#999" font-size="10">24V 200W ceramic</text>

  <!-- Thermal Fuse -->
  <rect x="625" y="185" width="220" height="40" rx="6" fill="#3d2f1f" stroke="#f39c12" stroke-width="1.5"/>
  <text x="735" y="210" text-anchor="middle" fill="#f39c12" font-size="11">Thermal Fuse (125&#xB0;C) - inline</text>

  <!-- Thermistor -->
  <rect x="625" y="245" width="220" height="50" rx="6" fill="#1f2d3d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="735" y="268" text-anchor="middle" fill="#7ec8e3" font-size="12" font-weight="bold">Thermistor (NTC 100K)</text>
  <text x="735" y="283" text-anchor="middle" fill="#888" font-size="9">Glued into PTC element body</text>

  <!-- Fan 1 -->
  <rect x="625" y="315" width="105" height="55" rx="6" fill="#1f3d2d" stroke="#82e0aa" stroke-width="1.5"/>
  <text x="677" y="340" text-anchor="middle" fill="#82e0aa" font-size="11" font-weight="bold">Fan 1</text>
  <text x="677" y="357" text-anchor="middle" fill="#888" font-size="9">24V 4020</text>

  <!-- Fan 2 -->
  <rect x="740" y="315" width="105" height="55" rx="6" fill="#1f3d2d" stroke="#82e0aa" stroke-width="1.5"/>
  <text x="792" y="340" text-anchor="middle" fill="#82e0aa" font-size="11" font-weight="bold">Fan 2</text>
  <text x="792" y="357" text-anchor="middle" fill="#888" font-size="9">24V 4020</text>

  <!-- Parallel label between fans -->
  <text x="735" y="390" text-anchor="middle" fill="#82e0aa" font-size="9" font-style="italic">wired in parallel</text>

  <!-- WAGO label -->
  <rect x="625" y="405" width="220" height="30" rx="4" fill="#333" stroke="#666" stroke-width="1"/>
  <text x="735" y="425" text-anchor="middle" fill="#ccc" font-size="10">All connections via WAGO 221-412</text>

  <!-- Wires -->

  <!-- Thermistor to Mainboard -->
  <path d="M625,268 L280,268 L280,145 L210,145" fill="none" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Fan 1 wire down to merge point -->
  <path d="M677,370 L677,395 L580,395" fill="none" stroke="#82e0aa" stroke-width="2"/>
  <!-- Fan 2 wire down to merge point -->
  <path d="M792,370 L792,395 L580,395" fill="none" stroke="#82e0aa" stroke-width="2"/>
  <!-- Merge dot -->
  <circle cx="580" cy="395" r="4" fill="#82e0aa"/>
  <!-- Merged wire to mainboard -->
  <path d="M580,395 L540,395 L540,190 L210,190" fill="none" stroke="#82e0aa" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Mainboard heater pin to Mosfet 2-pin ctrl -->
  <path d="M210,235 L310,235 L310,440 L395,440" fill="none" stroke="#f0b27a" stroke-width="2" marker-end="url(#arrow-orange)"/>

  <!-- PSU to Mosfet 24V in -->
  <path d="M230,405 L350,405" fill="none" stroke="#e67e22" stroke-width="2.5" marker-end="url(#arrow-orange)"/>

  <!-- Mosfet 24V out to PTC Heater via thermal fuse -->
  <path d="M510,400 L570,400 L570,140 L625,140" fill="none" stroke="#e74c3c" stroke-width="2.5" marker-end="url(#arrow-red)"/>

  <!-- Legend -->
  <rect x="30" y="470" width="860" height="2" fill="#333"/>
  <line x1="180" y1="488" x2="210" y2="488" stroke="#7ec8e3" stroke-width="2"/>
  <text x="215" y="492" fill="#7ec8e3" font-size="10">Thermistor signal</text>
  <line x1="340" y1="488" x2="370" y2="488" stroke="#82e0aa" stroke-width="2"/>
  <text x="375" y="492" fill="#82e0aa" font-size="10">Fan power (24V, parallel)</text>
  <line x1="520" y1="488" x2="550" y2="488" stroke="#e67e22" stroke-width="2.5"/>
  <text x="555" y="492" fill="#e67e22" font-size="10">PSU 24V</text>
  <line x1="630" y1="488" x2="660" y2="488" stroke="#e74c3c" stroke-width="2.5"/>
  <text x="665" y="492" fill="#e74c3c" font-size="10">Heater power</text>
  <line x1="770" y1="488" x2="800" y2="488" stroke="#f0b27a" stroke-width="2"/>
  <text x="805" y="492" fill="#f0b27a" font-size="10">Control</text>
</svg>
